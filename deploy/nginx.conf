upstream registry {
    server registry:8000;
}
upstream payment {
    server payment:8001;
}
upstream simulation {
    server simulation:8002;
}
upstream dashboard {
    server dashboard:8080;
}

server {
    listen 80;
    server_name _;

    # Registry API
    location /v1/auth/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/agents/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/tasks/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/graph/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/offers/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/ws {
        proxy_pass http://registry;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /.well-known/ {
        proxy_pass http://registry;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://registry;
        proxy_set_header Host $host;
    }
    location /docs {
        proxy_pass http://registry;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://registry;
        proxy_set_header Host $host;
    }

    # Payment API
    location /v1/wallets/ {
        proxy_pass http://payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/transactions/ {
        proxy_pass http://payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/approval_requests/ {
        proxy_pass http://payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Simulation API
    location /v1/simulations/ {
        proxy_pass http://simulation;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard (default)
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
