# Demo overrides — adds nginx gateway on port 80 for single-URL access
# Usage: docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d --build
#
# Then expose with Cloudflare Tunnel:
#   cloudflared tunnel --url http://localhost:80
#
# All APIs accessible via one URL:
#   /api/v1/auth/*         → registry
#   /api/v1/agents/*       → registry
#   /api/v1/tasks/*        → registry
#   /api/v1/wallets/*      → payment
#   /api/v1/transactions/* → payment
#   /api/v1/simulations/*  → simulation
#   /health                → registry
#   /*                     → dashboard

services:
  # Remap ports to avoid conflicts with other Docker apps (e.g., Dify)
  postgres:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  gateway:
    image: nginx:alpine
    container_name: agentnet-gateway
    ports:
      - "8888:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - registry
      - payment
      - simulation
      - dashboard
    restart: unless-stopped
    networks:
      - agentnet-network

  # Remove hot-reload for stability
  registry:
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      JAEGER_ENABLED: "false"

  payment:
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    environment:
      JAEGER_ENABLED: "false"

  simulation:
    volumes: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002
    environment:
      JAEGER_ENABLED: "false"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL_NAME: "${LLM_MODEL_NAME:-gemini-2.0-flash}"

  worker:
    volumes: []
    environment:
      JAEGER_ENABLED: "false"

  dashboard:
    environment:
      DASHBOARD_USER_EMAIL: "${DASHBOARD_USER_EMAIL:-dashboard_svc@agentnet.io}"
      DASHBOARD_USER_PASSWORD: "${DASHBOARD_USER_PASSWORD:-DashboardSvc2026!}"

  # Don't start Jaeger for demo
  jaeger:
    profiles:
      - tracing
