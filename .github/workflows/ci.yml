name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # Lint & Format
  # ─────────────────────────────────────────────────────────

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Check Black formatting
        run: |
          black --check --diff services/ tests/ sdk/

      - name: Check isort
        run: |
          isort --check-only --diff services/ tests/ sdk/

      - name: Check flake8
        run: |
          flake8 services/ tests/ sdk/ --max-line-length=120 --ignore=E501,W503,F401,F841,F541,F821,E722

  # ─────────────────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────────────────

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/ --ignore=tests/test_integration.py -v

  # ─────────────────────────────────────────────────────────
  # Docker Compose Validation
  # ─────────────────────────────────────────────────────────

  docker-validate:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose
        run: |
          docker compose config

      - name: Build all services
        run: |
          docker compose build --no-cache registry payment worker dashboard

  # ─────────────────────────────────────────────────────────
  # Build Docker Images
  # ─────────────────────────────────────────────────────────

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build registry
        uses: docker/build-push-action@v5
        with:
          context: ./services/registry
          push: false
          tags: agentnet/registry:latest

      - name: Build payment
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment
          push: false
          tags: agentnet/payment:latest

      - name: Build worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/worker
          push: false
          tags: agentnet/worker:latest

      - name: Build dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          push: false
          tags: agentnet/dashboard:latest
